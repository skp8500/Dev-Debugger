kind = "web"
previewPath = "/"
title = "Smart Dev Debugger"
version = "1.0.0"
id = "artifacts/smart-dev-debugger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24015

[services.development]
run = "pnpm --filter @workspace/smart-dev-debugger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-dev-debugger", "run", "build" ]
publicDir = "artifacts/smart-dev-debugger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24015"
BASE_PATH = "/"
