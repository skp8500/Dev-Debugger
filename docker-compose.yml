# ============================================================
# Docker Compose — Dev Debugger
# ============================================================
# Usage:
#   docker compose up --build        (builds & starts all services)
#   docker compose up -d             (detached mode)
#   docker compose logs -f api       (tail logs)
#
# Secrets are loaded from .env in the project root.
# NEVER hardcode secrets in this file.
# ============================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:3001"

    # ─── Load ALL env vars from the root .env file ───────────
    env_file:
      - .env

    # ─── Override / add individual vars if needed ────────────
    environment:
      - NODE_ENV=${NODE_ENV:-development}

    restart: unless-stopped

    # Health check hits the server; adjust the path as needed
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
